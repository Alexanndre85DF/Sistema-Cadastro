<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
  <h2>Login</h2>
  {% if erro %}
    <p style="color:red">{{ erro }}</p>
  {% endif %}
  <form method="post">
    <label>Usuário:</label><br>
    <input type="text" name="login"><br>
    <label>Senha:</label><br>
    <input type="password" name="senha"><br><br>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
